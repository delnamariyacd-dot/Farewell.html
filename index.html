<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farewell Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --primary-pink: #ff85a1; --deep-floral: #4a0e2e; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Poppins', sans-serif; background: #fffafa; }

        /* Falling effects only for Page 1 */
        .falling { position: absolute; top: -10%; pointer-events: none; z-index: 100; animation: fall linear infinite; }
        @keyframes fall { 
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* Section 1: Unlock Page */
        #unlock-page {
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; background: linear-gradient(to bottom, #ffeef2, #fff);
        }

        .input-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 85%; max-width: 350px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid var(--primary-pink); border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary-pink); color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: 600; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 300px; }

        /* Section 2: Main Invitation */
        #main-invite {
            display: none; min-height: 100vh; width: 100vw;
            background: #fff; text-align: center; padding: 20px 0;
        }

        .college-name { font-size: 0.9rem; color: #888; letter-spacing: 1px; font-weight: 600; margin-bottom: 5px; }
        .personal-msg { font-family: 'Dancing Script', cursive; font-size: 2.2rem; color: var(--primary-pink); margin: 10px 20px; }
        
        .poster-container { width: 90%; max-width: 450px; margin: 20px auto; }
        #poster-img { width: 100%; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); display: block; }

        .details { font-size: 1rem; color: #444; margin: 15px 0; line-height: 1.6; }
        .exit-btn { background: var(--deep-floral); margin-top: 20px; width: 150px; }
    </style>
</head>
<body>

    <div id="unlock-page">
        <div id="falling-container"></div>
        <div class="input-box">
            <h2 style="color: var(--deep-floral);">Welcome!</h2>
            <p>Enter your name to unlock your invitation</p>
            <input type="text" id="userName" placeholder="Type your name...">
            <button onclick="checkName()">Unlock</button>
        </div>
    </div>

    <div id="readyModal" class="modal">
        <div class="modal-content">
            <h3 id="modalQuestion">Are you ready for your farewell?</h3>
            <div style="display:flex; justify-content: space-around; margin-top: 20px;">
                <button onclick="goToInvite()">Yes!</button>
                <button style="background: #ccc;" onclick="handleNo()">No</button>
            </div>
        </div>
    </div>

    <div id="main-invite">
        <div class="college-name">CHRIST COLLEGE (AUTONOMOUS) IRINJALAKUDA</div>
        <div class="personal-msg" id="welcomeUser"></div>
        
        <div class="poster-container">
            <img id="poster-img" src="E36F70C1-48DE-459F-9548-15C77C9D3DA0.png" alt="Farewell Invitation">
        </div>

        <div class="details">
            <strong>📅 May 5, 2026</strong> | <strong>🕙 10:00 AM</strong><br>
            📍 Saint Chavara Seminar Hall
        </div>

        <button class="exit-btn" onclick="exitPage()">Okay</button>
    </div>

    <script>
        // Falling effects only for Page 1
        function createFlower() {
            const container = document.getElementById('falling-container');
            if(!container) return;
            const el = document.createElement('div');
            el.className = 'falling';
            el.innerHTML = Math.random() > 0.5 ? '🌸' : '❤️';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.fontSize = (Math.random() * 20 + 10) + 'px';
            el.style.animationDuration = (Math.random() * 3 + 2) + 's';
            container.appendChild(el);
            setTimeout(() => el.remove(), 5000);
        }
        let flowerInterval = setInterval(createFlower, 300);

        let noCount = 0;
        function checkName() {
            const name = document.getElementById('userName').value;
            if(name.trim() !== "") {
                document.getElementById('readyModal').style.display = 'flex';
            } else {
                alert("Please enter your name!");
            }
        }

        function handleNo() {
            noCount++;
            const q = document.getElementById('modalQuestion');
            if(noCount == 1) q.innerText = "Are you sure? 🥺";
            else if(noCount == 2) q.innerText = "Please don't! It would be fun! ✨";
            else { window.location.href = "https://www.google.com"; }
        }

        function goToInvite() {
            const name = document.getElementById('userName').value;
            // Stop flowers for page 2
            clearInterval(flowerInterval);
            document.getElementById('falling-container').innerHTML = "";

            document.getElementById('readyModal').style.display = 'none';
            document.getElementById('unlock-page').style.display = 'none';
            document.getElementById('main-invite').style.display = 'block';
            
            // Personalize the greeting
            document.getElementById('welcomeUser').innerText = name + ", You are invited!";

            // Confetti Blast
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        function exitPage() {
            alert("We'll see you there!");
            window.location.href = "https://www.google.com";
        }
    </script>
</body>
</html>
